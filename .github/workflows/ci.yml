# node version
# cache opt
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  sdk-test:
    name: SDK Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci
        working-directory: ./sdk
      - run: npm test
        working-directory: ./sdk
